name: dotnet-ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Coiny.slnx

      - name: Build
        run: dotnet build Coiny.slnx --no-restore --configuration Release

      - name: Test (full suite)
        run: dotnet test Coiny.slnx --no-build --configuration Release --verbosity normal

  showcase-tests:
    # Separate lane that runs only the thesis "showcase" tests (per THESIS-SCOPE.md §G item 13).
    # Output of this job is the screenshot used in the defense write-up. Filter uses the xUnit trait
    # syntax `Name=Value` (NOT the MSTest `Trait=Name`).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Coiny.slnx

      - name: Build test project
        run: dotnet build tests/Coiny.Application.Tests/Coiny.Application.Tests.csproj --no-restore --configuration Release

      - name: Test (showcase only)
        run: dotnet test tests/Coiny.Application.Tests/Coiny.Application.Tests.csproj --no-build --configuration Release --filter "Showcase=true" --verbosity normal
